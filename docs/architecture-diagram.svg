<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#a855f7"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22c55e"/></marker>
  </defs>

  <rect width="1100" height="750" fill="#0e0f11" rx="12"/>
  <text x="550" y="38" text-anchor="middle" fill="#e4e4e7" font-size="20" font-weight="700">UniEvent — AWS Architecture Diagram</text>
  <text x="550" y="58" text-anchor="middle" fill="#8b8c94" font-size="11">Scalable University Event Management System</text>

  <!-- Internet Users -->
  <rect x="460" y="75" width="180" height="40" rx="20" fill="#1c1d22" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="100" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="600">Internet Users</text>
  <line x1="550" y1="115" x2="550" y2="150" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- VPC Box -->
  <rect x="60" y="140" width="980" height="560" rx="10" fill="none" stroke="#2a2b31" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="70" y="130" width="160" height="24" rx="4" fill="#0e0f11"/>
  <text x="80" y="147" fill="#f59e0b" font-size="12" font-weight="700">VPC 10.0.0.0/16</text>

  <!-- Public Subnet 1 -->
  <rect x="90" y="160" width="440" height="140" rx="8" fill="#16171b" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="100" y="180" fill="#22c55e" font-size="11" font-weight="600">Public Subnet 1 — 10.0.1.0/24 (AZ-a)</text>
  <rect x="110" y="195" width="150" height="50" rx="6" fill="#1c1d22" stroke="#f59e0b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="185" y="216" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Application</text>
  <text x="185" y="232" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Load Balancer</text>
  <rect x="290" y="195" width="110" height="40" rx="6" fill="#1c1d22" stroke="#8b8c94" stroke-width="1" filter="url(#shadow)"/>
  <text x="345" y="220" text-anchor="middle" fill="#e4e4e7" font-size="10" font-weight="600">NAT Gateway</text>
  <rect x="290" y="248" width="110" height="36" rx="6" fill="#1c1d22" stroke="#8b8c94" stroke-width="1" filter="url(#shadow)"/>
  <text x="345" y="270" text-anchor="middle" fill="#e4e4e7" font-size="10" font-weight="600">Bastion Host</text>

  <!-- Public Subnet 2 -->
  <rect x="560" y="160" width="440" height="140" rx="8" fill="#16171b" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="570" y="180" fill="#22c55e" font-size="11" font-weight="600">Public Subnet 2 — 10.0.2.0/24 (AZ-b)</text>
  <rect x="680" y="195" width="150" height="50" rx="6" fill="#1c1d22" stroke="#f59e0b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="755" y="216" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">ALB Node</text>
  <text x="755" y="232" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">(AZ-b)</text>

  <!-- Internet Gateway -->
  <rect x="430" y="250" width="140" height="36" rx="18" fill="#1c1d22" stroke="#22c55e" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="273" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">Internet Gateway</text>

  <!-- Arrows to Private -->
  <line x1="185" y1="245" x2="260" y2="355" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>
  <line x1="755" y1="245" x2="760" y2="355" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>

  <!-- Private Subnet 1 -->
  <rect x="90" y="320" width="440" height="170" rx="8" fill="#16171b" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="100" y="340" fill="#ef4444" font-size="11" font-weight="600" opacity="0.8">Private Subnet 1 — 10.0.10.0/24 (AZ-a)</text>
  <rect x="150" y="358" width="200" height="110" rx="8" fill="#1c1d22" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="382" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">EC2 Instance 1</text>
  <text x="250" y="400" text-anchor="middle" fill="#8b8c94" font-size="10">t2.micro Amazon Linux 2023</text>
  <line x1="170" y1="410" x2="330" y2="410" stroke="#2a2b31" stroke-width="1"/>
  <text x="250" y="428" text-anchor="middle" fill="#e4e4e7" font-size="10">Flask + Gunicorn</text>
  <text x="250" y="444" text-anchor="middle" fill="#8b8c94" font-size="9">Port 5000 | IAM Role attached</text>
  <text x="250" y="458" text-anchor="middle" fill="#8b8c94" font-size="9">Background: Ticketmaster fetch</text>

  <!-- Private Subnet 2 -->
  <rect x="560" y="320" width="440" height="170" rx="8" fill="#16171b" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="570" y="340" fill="#ef4444" font-size="11" font-weight="600" opacity="0.8">Private Subnet 2 — 10.0.20.0/24 (AZ-b)</text>
  <rect x="650" y="358" width="200" height="110" rx="8" fill="#1c1d22" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="382" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">EC2 Instance 2</text>
  <text x="750" y="400" text-anchor="middle" fill="#8b8c94" font-size="10">t2.micro Amazon Linux 2023</text>
  <line x1="670" y1="410" x2="830" y2="410" stroke="#2a2b31" stroke-width="1"/>
  <text x="750" y="428" text-anchor="middle" fill="#e4e4e7" font-size="10">Flask + Gunicorn</text>
  <text x="750" y="444" text-anchor="middle" fill="#8b8c94" font-size="9">Port 5000 | IAM Role attached</text>
  <text x="750" y="458" text-anchor="middle" fill="#8b8c94" font-size="9">Background: Ticketmaster fetch</text>

  <!-- S3 -->
  <rect x="120" y="540" width="260" height="80" rx="8" fill="#1c1d22" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="568" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">Amazon S3</text>
  <text x="250" y="586" text-anchor="middle" fill="#8b8c94" font-size="10">unievent-media-bucket</text>
  <text x="250" y="602" text-anchor="middle" fill="#8b8c94" font-size="9">event-images/ | event-posters/</text>
  <line x1="250" y1="468" x2="250" y2="540" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>
  <line x1="750" y1="468" x2="380" y2="560" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>

  <!-- Ticketmaster -->
  <rect x="480" y="540" width="260" height="80" rx="8" fill="#1c1d22" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="568" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="700">Ticketmaster API</text>
  <text x="610" y="586" text-anchor="middle" fill="#8b8c94" font-size="10">Discovery API v2</text>
  <text x="610" y="602" text-anchor="middle" fill="#8b8c94" font-size="9">Events, Venues, Images (JSON)</text>
  <line x1="250" y1="468" x2="540" y2="540" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- IAM -->
  <rect x="810" y="540" width="200" height="80" rx="8" fill="#1c1d22" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="910" y="568" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="700">IAM Role</text>
  <text x="910" y="586" text-anchor="middle" fill="#8b8c94" font-size="10">UniEvent-EC2-Role</text>
  <text x="910" y="602" text-anchor="middle" fill="#8b8c94" font-size="9">S3 Put/Get | Least Privilege</text>
  <line x1="860" y1="540" x2="800" y2="468" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- Legend -->
  <rect x="90" y="650" width="920" height="40" rx="6" fill="#16171b" stroke="#2a2b31" stroke-width="1"/>
  <circle cx="120" cy="670" r="5" fill="#f59e0b"/><text x="132" y="674" fill="#8b8c94" font-size="10">ALB / S3</text>
  <circle cx="220" cy="670" r="5" fill="#3b82f6"/><text x="232" y="674" fill="#8b8c94" font-size="10">EC2 Compute</text>
  <circle cx="340" cy="670" r="5" fill="#a855f7"/><text x="352" y="674" fill="#8b8c94" font-size="10">External API</text>
  <circle cx="460" cy="670" r="5" fill="#22c55e"/><text x="472" y="674" fill="#8b8c94" font-size="10">IAM / IGW</text>
  <circle cx="570" cy="670" r="5" fill="#ef4444" opacity="0.6"/><text x="582" y="674" fill="#8b8c94" font-size="10">Private (no public IP)</text>
  <text x="780" y="674" fill="#8b8c94" font-size="10">CE 313 | GIK Institute | 2026</text>
</svg>
